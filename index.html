<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pusara Makmur</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Custom Scrollbar for Map Area */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Highlight Animation (Glowing Effect) */
        @keyframes glow {
            0% { box-shadow: 0 0 5px 2px #fde047; transform: scale(1); }
            50% { box-shadow: 0 0 20px 8px #fde047; transform: scale(1.15); z-index: 10; }
            100% { box-shadow: 0 0 5px 2px #fde047; transform: scale(1); }
        }
        
        .grave-slot {
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.1);
        }
        
        .grave-slot:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .grave-highlighted {
            background-color: #fde047 !important; /* Yellow 300 */
            animation: glow 1.5s infinite;
            z-index: 20;
            border-color: #ca8a04;
        }

        /* Separator Line for Gender Split */
        .gender-separator {
            position: absolute;
            right: -5px;
            top: 0;
            height: 100%;
            width: 2px;
            background-color: #d1d5db;
            z-index: 5;
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">
                    <!-- MapPin SVG -->
                    <svg class="text-green-700 w-6 h-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-bold text-green-800 leading-tight">Sistem Pusara Makmur</h1>
                    <p class="text-sm text-gray-500 font-medium">Carian Interaktif Tanah Perkuburan Islam</p>
                </div>
            </div>

            <!-- SEARCH BAR -->
            <div class="w-full sm:w-96 relative">
                <div class="relative">
                    <input
                        type="text"
                        id="searchInput"
                        class="w-full pl-12 pr-4 py-3 sm:py-4 rounded-xl border-2 border-gray-200 focus:border-green-600 focus:outline-none focus:ring-0 text-lg shadow-sm transition-all placeholder-gray-400"
                        placeholder="Cari nama arwah..."
                        onkeyup="handleSearch()"
                    />
                    <!-- Search SVG -->
                    <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-6 h-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    
                    <!-- Clear Button (Hidden by default) -->
                    <button id="clearSearchBtn" onclick="clearSearch()" class="hidden absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>

                <!-- SEARCH SUGGESTIONS -->
                <div id="searchSuggestions" class="hidden absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-xl border border-gray-100 max-h-60 overflow-y-auto z-50">
                    <!-- Suggestions will be populated here via JS -->
                </div>
            </div>
        </div>
    </header>

    <!-- LEGEND -->
    <div class="bg-white border-b border-gray-200 z-20">
        <div class="max-w-7xl mx-auto px-4 py-3 sm:px-6 lg:px-8 flex flex-wrap gap-4 justify-center sm:justify-start text-sm sm:text-base font-medium">
            <span class="flex items-center gap-2"><div class="w-5 h-5 rounded-md bg-[#e5e7eb]"></div> Kosong</span>
            <span class="flex items-center gap-2"><div class="w-5 h-5 rounded-md bg-[#3b82f6]"></div> Lelaki</span>
            <span class="flex items-center gap-2"><div class="w-5 h-5 rounded-md bg-[#ec4899]"></div> Perempuan</span>
            <span class="flex items-center gap-2"><div class="w-5 h-5 rounded-md bg-[#f59e0b]"></div> Kanak-kanak</span>
            <span class="flex items-center gap-2"><div class="w-5 h-5 rounded-md bg-[#8b5cf6]"></div> Tempahan</span>
        </div>
    </div>

    <!-- MAIN MAP AREA -->
    <main class="flex-1 overflow-hidden relative bg-[#dcfce7]">
        <div id="mapContainer" class="w-full h-full overflow-auto p-4 sm:p-8 custom-scrollbar" style="touch-action: pan-x pan-y;">
            <div class="min-w-max mx-auto bg-white p-6 sm:p-10 rounded-2xl shadow-lg border border-green-100 inline-block">
                
                <!-- QIBLAT INDICATOR -->
                <div class="flex justify-between items-center mb-8 border-b-2 border-dashed border-green-200 pb-4">
                    <div class="text-xl font-bold text-green-800">Blok Utama (Al-Firdaus)</div>
                    <div class="flex items-center gap-2 text-green-700 bg-green-50 px-4 py-2 rounded-full font-semibold">
                        Kiblat &larr;
                    </div>
                </div>

                <!-- ADULT SECTION CONTAINER -->
                <div class="mb-12">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                        Kawasan Dewasa
                        <span class="text-xs font-normal bg-gray-100 px-2 py-1 rounded text-gray-500">Kiri: Lelaki (10) | Kanan: Perempuan (9)</span>
                    </h2>
                    <div id="adultGridContainer" class="flex flex-col gap-3">
                        <!-- Filled by JS -->
                    </div>
                </div>

                <!-- CHILD SECTION CONTAINER -->
                <div>
                    <h2 class="text-lg font-semibold text-gray-700 mb-4">Kawasan Kanak-kanak</h2>
                    <div id="childGridContainer" class="flex flex-col gap-3">
                        <!-- Filled by JS -->
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- MODAL (Hidden by default) -->
    <div id="infoModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900 bg-opacity-60 backdrop-blur-sm transition-opacity" onclick="closeModal()">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col" onclick="event.stopPropagation()">
            <!-- Modal Header -->
            <div class="bg-green-700 px-6 py-4 flex justify-between items-center text-white">
                <h3 class="text-xl font-bold">Maklumat Pusara</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-green-600 rounded-full transition-colors focus:outline-none">
                    <!-- X SVG -->
                    <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- Modal Body (Dynamic content) -->
            <div id="modalBody" class="p-6 sm:p-8 flex-1 overflow-y-auto">
                <!-- Filled by JS -->
            </div>
            
            <!-- Modal Footer -->
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
                <button onclick="closeModal()" class="w-full py-3 sm:py-4 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold rounded-xl text-lg transition-colors focus:outline-none">
                    Tutup Maklumat
                </button>
            </div>
        </div>
    </div>

    <!-- SCRIPT LOGIC -->
    <script>
        // --- CONFIGURATION & THEME ---
        const ROW_COUNT_ADULT = 5;
        const COL_COUNT_ADULT = 19; // 10 L, 9 P
        const ROW_COUNT_CHILD = 2;
        const COL_COUNT_CHILD = 10;

        const THEME = {
            male: '#3b82f6',
            female: '#ec4899',
            child: '#f59e0b',
            empty: '#e5e7eb',
            reserved: '#8b5cf6'
        };

        // --- MOCK DATABASE GENERATOR ---
        const generateMockData = () => {
            const positions = [];
            const deceasedRecords = [
                { id: 101, name: "Ahmad bin Abdullah", dateOfDeath: "2023-05-15", age: 65, gender: 'lelaki', notes: "Meninggal kerana sakit tua." },
                { id: 102, name: "Fatimah binti Hassan", dateOfDeath: "2023-06-20", age: 72, gender: 'perempuan', notes: "" },
                { id: 103, name: "Mohd Ali bin Abu", dateOfDeath: "2024-01-10", age: 55, gender: 'lelaki', notes: "Kemalangan" },
                { id: 104, name: "Siti Aminah binti Omar", dateOfDeath: "2024-02-05", age: 80, gender: 'perempuan', notes: "Dikebumikan sebelah petang." },
                { id: 105, name: "Muhammad Zikri", dateOfDeath: "2024-03-12", age: 8, gender: 'lelaki', notes: "Kanak-kanak" },
            ];

            let recordIndex = 0;

            // Generate Adult Section
            for (let r = 1; r <= ROW_COUNT_ADULT; r++) {
                for (let c = 1; c <= COL_COUNT_ADULT; c++) {
                    const isMaleSide = c <= 10;
                    const id = `A-R${r}-C${c}`;
                    let status = 'kosong';
                    let record = null;

                    // Assign some random records
                    if ((r === 1 && c === 2) || (r === 2 && c === 15) || (r === 3 && c === 5) || (r === 4 && c === 12)) {
                        status = 'telah_digunakan';
                        record = deceasedRecords[recordIndex++];
                    } else if (r === 1 && c === 18) {
                        status = 'tempahan';
                    }

                    positions.push({
                        id, section: 'dewasa', row: r, col: c,
                        lotNumber: `B1-${r}-${c}`,
                        genderAssigned: isMaleSide ? 'lelaki' : 'perempuan',
                        status, record
                    });
                }
            }

            // Generate Child Section
            for (let r = 1; r <= ROW_COUNT_CHILD; r++) {
                for (let c = 1; c <= COL_COUNT_CHILD; c++) {
                    const id = `C-R${r}-C${c}`;
                    let status = 'kosong';
                    let record = null;

                    if (r === 1 && c === 3) {
                        status = 'telah_digunakan';
                        record = deceasedRecords[recordIndex];
                    }

                    positions.push({
                        id, section: 'kanak-kanak',
                        row: r + ROW_COUNT_ADULT, // For logic/UI mapping
                        col: c, lotNumber: `K1-${r}-${c}`,
                        genderAssigned: 'campur',
                        status, record
                    });
                }
            }
            return positions;
        };

        const MOCK_DB = generateMockData();
        let currentHighlightedId = null;

        // --- RENDERING LOGIC ---
        function getGraveColor(grave) {
            if (grave.status === 'kosong') return THEME.empty;
            if (grave.status === 'tempahan') return THEME.reserved;
            if (grave.section === 'kanak-kanak') return THEME.child;
            return grave.record?.gender === 'lelaki' ? THEME.male : THEME.female;
        }

        function initGrid() {
            const adultContainer = document.getElementById('adultGridContainer');
            const childContainer = document.getElementById('childGridContainer');
            
            let adultHTML = '';
            // Render Adult Rows
            for (let r = 1; r <= ROW_COUNT_ADULT; r++) {
                const rowGraves = MOCK_DB.filter(g => g.section === 'dewasa' && g.row === r);
                adultHTML += `<div class="flex items-center gap-4">
                                <div class="w-8 font-bold text-gray-400 text-right">B${r}</div>
                                <div class="flex gap-2 relative">`;
                
                rowGraves.forEach(grave => {
                    const color = getGraveColor(grave);
                    const isSeparator = grave.col === 10;
                    const tooltip = `Lot: ${grave.lotNumber}\nStatus: ${grave.status.replace('_', ' ')}`;
                    
                    adultHTML += `
                        <button id="grave-${grave.id}" 
                                class="grave-slot relative w-8 h-16 sm:w-10 sm:h-20 rounded-md focus:outline-none focus:ring-4 focus:ring-green-400"
                                style="background-color: ${color};"
                                title="${tooltip}"
                                onclick="handleGraveClick('${grave.id}')">
                            ${isSeparator ? '<div class="gender-separator"></div>' : ''}
                        </button>
                    `;
                });
                adultHTML += `</div></div>`;
            }
            adultContainer.innerHTML = adultHTML;

            // Render Child Rows
            let childHTML = '';
            for (let r = 1; r <= ROW_COUNT_CHILD; r++) {
                const actualRow = r + ROW_COUNT_ADULT;
                const rowGraves = MOCK_DB.filter(g => g.section === 'kanak-kanak' && g.row === actualRow);
                childHTML += `<div class="flex items-center gap-4">
                                <div class="w-8 font-bold text-gray-400 text-right">B${r}</div>
                                <div class="flex gap-2">`;
                
                rowGraves.forEach(grave => {
                    const color = getGraveColor(grave);
                    const tooltip = `Lot: ${grave.lotNumber}\nStatus: ${grave.status.replace('_', ' ')}`;
                    
                    childHTML += `
                        <button id="grave-${grave.id}" 
                                class="grave-slot w-6 h-12 sm:w-8 sm:h-14 rounded-md focus:outline-none focus:ring-4 focus:ring-amber-400"
                                style="background-color: ${color};"
                                title="${tooltip}"
                                onclick="handleGraveClick('${grave.id}')">
                        </button>
                    `;
                });
                childHTML += `</div></div>`;
            }
            childContainer.innerHTML = childHTML;
        }

        // --- INTERACTION LOGIC ---
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const suggestionsBox = document.getElementById('searchSuggestions');
            const clearBtn = document.getElementById('clearSearchBtn');
            
            if (query.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');

            if (query.length === 0) {
                suggestionsBox.classList.add('hidden');
                clearHighlight();
                return;
            }

            const results = MOCK_DB.filter(grave => 
                grave.status === 'telah_digunakan' && 
                grave.record && 
                grave.record.name.toLowerCase().includes(query)
            );

            if (results.length > 0) {
                let html = '';
                results.forEach(grave => {
                    html += `
                        <button class="w-full text-left px-4 py-3 hover:bg-green-50 border-b border-gray-50 last:border-0 flex items-center justify-between"
                                onclick="selectSearchResult('${grave.id}')">
                            <div>
                                <p class="font-semibold text-gray-800 text-lg">${grave.record.name}</p>
                                <p class="text-sm text-gray-500">Lot: ${grave.lotNumber}</p>
                            </div>
                            <svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                    `;
                });
                suggestionsBox.innerHTML = html;
            } else {
                suggestionsBox.innerHTML = `<div class="p-4 text-center text-gray-500">Tiada rekod dijumpai.</div>`;
            }
            
            suggestionsBox.classList.remove('hidden');
        }

        function selectSearchResult(graveId) {
            const grave = MOCK_DB.find(g => g.id === graveId);
            if(!grave) return;

            document.getElementById('searchInput').value = grave.record.name;
            document.getElementById('searchSuggestions').classList.add('hidden');
            
            applyHighlight(graveId);
            // openModal(graveId); <-- Baris ini dibuang supaya tidak terus popup

            // Auto-scroll
            setTimeout(() => {
                const el = document.getElementById(`grave-${graveId}`);
                if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            }, 100);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchSuggestions').classList.add('hidden');
            document.getElementById('clearSearchBtn').classList.add('hidden');
            clearHighlight();
        }

        function handleGraveClick(graveId) {
            applyHighlight(graveId);
            openModal(graveId);
        }

        function applyHighlight(graveId) {
            clearHighlight();
            currentHighlightedId = graveId;
            const el = document.getElementById(`grave-${graveId}`);
            if(el) {
                el.classList.add('grave-highlighted');
            }
        }

        function clearHighlight() {
            if(currentHighlightedId) {
                const el = document.getElementById(`grave-${currentHighlightedId}`);
                if(el) el.classList.remove('grave-highlighted');
                currentHighlightedId = null;
            }
        }

        function openModal(graveId) {
            const grave = MOCK_DB.find(g => g.id === graveId);
            if(!grave) return;

            const modalBody = document.getElementById('modalBody');
            
            // Common Header for Lot info
            let html = `
                <div class="flex items-center gap-4 mb-6 pb-6 border-b border-gray-100">
                    <div class="w-16 h-16 rounded-xl bg-green-100 flex items-center justify-center text-green-700">
                        <svg class="w-8 h-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 uppercase tracking-wider font-semibold">No. Lot / Posisi</p>
                        <p class="text-2xl font-bold text-gray-900">${grave.lotNumber}</p>
                        <p class="text-sm text-gray-600 capitalize">Bahagian: ${grave.section} ${grave.section === 'dewasa' ? `(${grave.genderAssigned})` : ''}</p>
                    </div>
                </div>
            `;

            if (grave.status === 'kosong') {
                html += `
                    <div class="text-center py-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-4">
                            <svg class="w-8 h-8 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        </div>
                        <h4 class="text-xl font-bold text-gray-700 mb-2">Lot Ini Kosong</h4>
                        <p class="text-gray-500">Lot ini sedia untuk digunakan.</p>
                    </div>
                `;
            } else if (grave.status === 'tempahan') {
                html += `
                    <div class="text-center py-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-violet-100 mb-4">
                            <svg class="w-8 h-8 text-violet-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        </div>
                        <h4 class="text-xl font-bold text-violet-700 mb-2">Telah Ditempah</h4>
                        <p class="text-gray-500">Lot ini telah ditempah terlebih dahulu.</p>
                    </div>
                `;
            } else if (grave.record) {
                const dateStr = new Date(grave.record.dateOfDeath).toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' });
                html += `
                    <div class="space-y-5">
                        <div>
                            <p class="text-sm text-gray-500 mb-1 font-semibold">Nama Penuh</p>
                            <p class="text-xl font-bold text-gray-900 flex items-start gap-2">
                                <svg class="w-6 h-6 text-green-600 shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                ${grave.record.name}
                            </p>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <p class="text-sm text-gray-500 mb-1 font-semibold flex items-center gap-1">
                                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> 
                                    Tarikh Meninggal
                                </p>
                                <p class="text-lg font-bold text-gray-800">${dateStr}</p>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <p class="text-sm text-gray-500 mb-1 font-semibold">Jantina & Umur</p>
                                <p class="text-lg font-bold text-gray-800 capitalize">${grave.record.gender}, ${grave.record.age} thn</p>
                            </div>
                        </div>
                        ${grave.record.notes ? `
                            <div class="mt-4 p-4 bg-blue-50 rounded-xl border border-blue-100 text-blue-800">
                                <p class="text-sm font-semibold mb-1 flex items-center gap-1">
                                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                                    Nota Tambahan
                                </p>
                                <p>${grave.record.notes}</p>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            modalBody.innerHTML = html;
            document.getElementById('infoModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('infoModal').classList.add('hidden');
            // Check if search input is active. If not, clear highlight.
            if(document.getElementById('searchInput').value === '') {
                 clearHighlight();
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const searchContainer = document.querySelector('.relative.w-full');
            const suggestionsBox = document.getElementById('searchSuggestions');
            if (!searchContainer.contains(event.target)) {
                suggestionsBox.classList.add('hidden');
            }
        });

        // Initialize on load
        window.onload = initGrid;
    </script>
</body>
</html>
